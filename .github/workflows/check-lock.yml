on:
  workflow_call:

permissions: {}

jobs:
  lock:
    timeout-minutes: 10
    runs-on: ubuntu-slim
    name: "uv lockfiles"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Install uv"
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.26"
      - name: "Check project lockfile"
        run: uv lock --check
      - name: "Check script lockfiles"
        env:
          UV_PREVIEW_FEATURES: workspace-list-scripts
        run: |
          scripts="$(uv workspace list --scripts)"
          while IFS= read -r script; do
            if [[ ! -f "${script}.lock" ]]; then
              echo "Missing lockfile for ${script}; run 'uv lock --script ${script}'"
              exit 1
            fi
            uv lock --script "${script}" --check
          done <<< "${scripts}"
