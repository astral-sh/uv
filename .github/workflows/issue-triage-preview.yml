# Preview issue triage prompt changes without modifying issues.
name: "Issue triage preview"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "agents/prompts/triage-issue.md"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  collect:
    if: github.repository == 'astral-sh/uv' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      issues: ${{ steps.issues.outputs.issues }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Install uv"
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
      - name: "Find recent issues"
        id: issues
        run: uv run --locked --no-project --script scripts/issue-triage-preview.py collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  triage:
    name: "Triage issue ${{ matrix.issue }}"
    needs: collect
    permissions:
      contents: read
      issues: read
    strategy:
      fail-fast: false
      matrix:
        issue: ${{ fromJSON(needs.collect.outputs.issues) }}
    uses: ./.github/workflows/issue-triage.yml # zizmor: ignore[secrets-inherit] Required for environment secrets in reusable workflows.
    with:
      issue: ${{ matrix.issue }}
    secrets: inherit

  report:
    needs: triage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Install uv"
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
      - name: "Create or update preview comment"
        run: uv run --locked --no-project --script scripts/issue-triage-preview.py comment --pull-request "$PULL_REQUEST_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
