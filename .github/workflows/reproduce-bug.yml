name: "reproduce-bug"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Benchmark label"
        required: true
        type: string
      runner:
        description: "Unused; retained for the existing dispatch interface"
        default: ubuntu-latest
        required: true
        type: choice
        options:
          - ubuntu-latest
          - macos-latest

permissions: {}

env:
  CARGO_BUILD_JOBS: 16
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  benchmark:
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install mold"
        run: ./scripts/install-mold.sh

      - name: "Install toolchains"
        run: |
          rustup show
          rustup toolchain install nightly-2026-07-13 --profile minimal --component rust-src
          cargo +1.97.0 --version
          rustc +1.97.0 --version --verbose
          cargo +nightly-2026-07-13 --version
          rustc +nightly-2026-07-13 --version --verbose

      - name: "Install cargo nextest"
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: "Warm registry cache"
        run: cargo +1.97.0 fetch --locked

      - name: "Build test artifacts"
        shell: bash
        run: |
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            echo "::group::cold $variant"
            /usr/bin/time -f "TIMING cold $variant real=%e user=%U sys=%S" -o "$RUNNER_TEMP/timings" -a \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
            echo "::endgroup::"
          }

          run stable 1.97.0
          run nightly nightly-2026-07-13
          run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          run immediate nightly-2026-07-13 --target x86_64-unknown-linux-gnu --config 'profile.fast-build.panic="immediate-abort"' -Z panic-abort-tests -Z panic-immediate-abort -Z build-std
          du -sh "$RUNNER_TEMP"/uv-* || true

      - name: "Warm rebuild pass one"
        shell: bash
        run: |
          touch crates/uv/src/lib.rs
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            echo "::group::warm-1 $variant"
            /usr/bin/time -f "TIMING warm-1 $variant real=%e user=%U sys=%S" -o "$RUNNER_TEMP/timings" -a \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
            echo "::endgroup::"
          }

          run stable 1.97.0
          run nightly nightly-2026-07-13
          run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          run immediate nightly-2026-07-13 --target x86_64-unknown-linux-gnu --config 'profile.fast-build.panic="immediate-abort"' -Z panic-abort-tests -Z panic-immediate-abort -Z build-std

      - name: "Warm rebuild pass two"
        shell: bash
        run: |
          touch crates/uv/src/lib.rs
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            echo "::group::warm-2 $variant"
            /usr/bin/time -f "TIMING warm-2 $variant real=%e user=%U sys=%S" -o "$RUNNER_TEMP/timings" -a \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
            echo "::endgroup::"
          }

          run immediate nightly-2026-07-13 --target x86_64-unknown-linux-gnu --config 'profile.fast-build.panic="immediate-abort"' -Z panic-abort-tests -Z panic-immediate-abort -Z build-std
          run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          run nightly nightly-2026-07-13
          run stable 1.97.0

      - name: "Measure no-op builds"
        shell: bash
        run: |
          run() {
            local repeat="$1"
            local variant="$2"
            local toolchain="$3"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 3
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            /usr/bin/time -f "TIMING noop-$repeat $variant real=%e user=%U sys=%S" -o "$RUNNER_TEMP/timings" -a \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
          }

          for repeat in 1 2 3; do
            run "$repeat" stable 1.97.0
            run "$repeat" nightly nightly-2026-07-13
            run "$repeat" abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
            run "$repeat" immediate nightly-2026-07-13 --target x86_64-unknown-linux-gnu --config 'profile.fast-build.panic="immediate-abort"' -Z panic-abort-tests -Z panic-immediate-abort -Z build-std
          done

          printf '%s\n' '### Cargo test build timings' '```text' >> "$GITHUB_STEP_SUMMARY"
          sed -n '/^TIMING /p' "$RUNNER_TEMP/timings" | tee -a "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '```' >> "$GITHUB_STEP_SUMMARY"

      - name: "Run panic-sensitive tests"
        shell: bash
        run: |
          set +e
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux --ignore-default-filter
              -E 'test(/fetch_url_(no_host|with_password|with_empty_username)/) or test(/test_global_preview_panic_(nested|uninitialized)/)'
              --status-level fail --final-status-level fail --failure-output never --success-output never
            )
            args+=("$@")
            echo "::group::panic-tests $variant"
            env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
            local result=$?
            echo "PANIC_TEST_RESULT $variant exit=$result"
            echo "::endgroup::"
            return 0
          }

          run stable 1.97.0
          run nightly nightly-2026-07-13
          run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          run immediate nightly-2026-07-13 --target x86_64-unknown-linux-gnu --config 'profile.fast-build.panic="immediate-abort"' -Z panic-abort-tests -Z panic-immediate-abort -Z build-std
