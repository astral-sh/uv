name: "macos-workspace-cache-benchmark"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Benchmark label"
        required: true
        type: string
      runner:
        description: "Unused; retained for the existing dispatch interface"
        default: ubuntu-latest
        required: true
        type: choice
        options:
          - ubuntu-latest
          - macos-latest

permissions: {}

jobs:
  seed:
    name: "seed macos cache ${{ matrix.variant }} sample ${{ matrix.sample }}"
    runs-on: depot-macos-15
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
        variant: [stable, optimized]
    env:
      CARGO_BUILD_JOBS: 8
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      RUSTUP_MAX_RETRIES: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install Rust toolchain"
        shell: bash
        run: |
          set -euo pipefail
          toolchain=1.97.0
          if [[ '${{ matrix.variant }}' = optimized ]]; then
            toolchain=nightly-2026-07-13
          fi
          rustup toolchain install "$toolchain" --profile minimal
          cargo +"$toolchain" --version
          rustc +"$toolchain" --version --verbose

      - name: "Rust cache"
        id: cache-seed
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: ${{ matrix.variant == 'optimized' && 'nightly-2026-07-13' || '1.97.0' }}
        with:
          prefix-key: v0-uv-macos-workspace-cache-20260715a
          shared-key: ${{ matrix.variant }}-${{ matrix.sample }}
          workspaces: ". -> target-${{ matrix.variant }}"
          cache-workspace-crates: ${{ matrix.variant == 'optimized' }}
          save-if: true

      - name: "Install cargo nextest"
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: "Seed macos test artifacts"
        if: steps.cache-seed.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          variant='${{ matrix.variant }}'
          toolchain=1.97.0
          target="target-$variant"
          args=(
            nextest run --no-run --cargo-quiet --cargo-profile fast-build
            --no-default-features
            --features 'test-python,test-python-managed,test-pypi,test-git,test-git-lfs,performance,test-crates-io,native-auth,apple-native'
            --workspace --locked --profile ci-macos
          )
          if [[ "$variant" = optimized ]]; then
            toolchain=nightly-2026-07-13
            args+=(--config 'profile.fast-build.panic="abort"' -Z panic-abort-tests -Z checksum-freshness)
          fi
          start=$(date +%s)
          CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
          printf 'TIMING seed variant=%s sample=%s real=%ss\n' "$variant" '${{ matrix.sample }}' "$(( $(date +%s) - start ))"
          du -sh "$target"

  measure:
    needs: seed
    name: "measure macos sample ${{ matrix.sample }}"
    runs-on: depot-macos-15
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
    env:
      CARGO_BUILD_JOBS: 8
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      RUSTUP_MAX_RETRIES: 10
      UV_HTTP_RETRIES: 5
      INSTA_UPDATE: new
      INSTA_PENDING_DIR: ${{ github.workspace }}/pending-snapshots
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install Rust toolchains"
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup toolchain install nightly-2026-07-13 --profile minimal
          cargo +1.97.0 --version
          cargo +nightly-2026-07-13 --version
          rustc +1.97.0 --version --verbose
          rustc +nightly-2026-07-13 --version --verbose

      - name: "Restore stable cache"
        id: cache-stable
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          key: v0-uv-macos-workspace-cache-20260715a-stable-${{ matrix.sample }}-Darwin-arm64-63c54866-f430e92f
          fail-on-cache-miss: true
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
            target-stable

      - name: "Restore optimized cache"
        id: cache-optimized
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          key: v0-uv-macos-workspace-cache-20260715a-optimized-${{ matrix.sample }}-Darwin-arm64-58c8e58c-f430e92f
          fail-on-cache-miss: true
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
            target-optimized

      - name: "Confirm cache hits"
        shell: bash
        env:
          STABLE_CACHE_HIT: ${{ steps.cache-stable.outputs.cache-hit }}
          OPTIMIZED_CACHE_HIT: ${{ steps.cache-optimized.outputs.cache-hit }}
        run: |
          set -euo pipefail
          printf 'CACHE sample=%s variant=stable hit=%s\n' '${{ matrix.sample }}' "$STABLE_CACHE_HIT"
          printf 'CACHE sample=%s variant=optimized hit=%s\n' '${{ matrix.sample }}' "$OPTIMIZED_CACHE_HIT"
          test "$STABLE_CACHE_HIT" = true
          test "$OPTIMIZED_CACHE_HIT" = true
          du -sh target-stable target-optimized

      - name: "Create HFS+ disk image"
        run: |
          hdiutil create -size 256m -fs HFS+ -volname NoReflink /tmp/noreflink.dmg
          hdiutil attach /tmp/noreflink.dmg
          echo "HFS_MOUNT=/Volumes/NoReflink" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: "Install required Python versions"
        run: uv python install

      - name: "Install cargo nextest"
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: "Measure macos test job"
        shell: bash
        env:
          RUST_BACKTRACE: 1
          UV_INTERNAL__TEST_COW_FS: ${{ runner.temp }}
          UV_INTERNAL__TEST_NOCOW_FS: ${{ env.HFS_MOUNT }}
          UV_INTERNAL__TEST_ALT_FS: ${{ env.HFS_MOUNT }}
        run: |
          set -euo pipefail
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$3"
            shift 3
            local -a args=(
              nextest run --cargo-profile fast-build
              --no-default-features
              --features 'test-python,test-python-managed,test-pypi,test-git,test-git-lfs,performance,test-crates-io,native-auth,apple-native'
              --workspace --locked --profile ci-macos
              --status-level fail --final-status-level fail
              --failure-output immediate --success-output never
            )
            args+=("$@")
            local start
            start=$(date +%s)
            CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
            printf 'TIMING overall variant=%s sample=%s real=%ss\n' "$variant" '${{ matrix.sample }}' "$(( $(date +%s) - start ))"
          }
          if (( ${{ matrix.sample }} % 2 )); then
            run stable 1.97.0 target-stable
            run optimized nightly-2026-07-13 target-optimized --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests -Z checksum-freshness
          else
            run optimized nightly-2026-07-13 target-optimized --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests -Z checksum-freshness
            run stable 1.97.0 target-stable
          fi
