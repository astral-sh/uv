name: "workspace-cache-io-benchmark"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Benchmark label"
        required: true
        type: string
      runner:
        description: "Unused; retained for the existing dispatch interface"
        default: ubuntu-latest
        required: true
        type: choice
        options:
          - ubuntu-latest
          - macos-latest

permissions: {}

jobs:
  seed:
    name: "seed cache ${{ matrix.variant }} sample ${{ matrix.sample }}"
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
        variant: [dependencies, workspace]
    env:
      CARGO_BUILD_JOBS: 16
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      RUSTUP_MAX_RETRIES: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install mold"
        run: ./scripts/install-mold.sh

      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install nightly-2026-07-13 --profile minimal
          cargo +nightly-2026-07-13 --version
          rustc +nightly-2026-07-13 --version --verbose

      - name: "Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-07-13
        with:
          prefix-key: v0-uv-workspace-cache-io-20260715a
          shared-key: ${{ matrix.variant }}-${{ matrix.sample }}
          workspaces: ". -> target-${{ matrix.variant }}"
          cache-workspace-crates: ${{ matrix.variant == 'workspace' }}
          save-if: true

      - name: "Install cargo nextest"
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: "Seed workspace artifacts"
        shell: bash
        run: |
          set -euo pipefail
          variant='${{ matrix.variant }}'
          target="target-$variant"
          args=(
            nextest run --no-run --cargo-quiet --cargo-profile fast-build
            --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
            --features 'test-python-patch,test-universal,native-auth,secret-service'
            --workspace --locked --profile ci-linux
          )
          if [[ "$variant" = workspace ]]; then
            args+=(-Z checksum-freshness)
          fi
          /usr/bin/time -f "TIMING seed variant=$variant sample=${{ matrix.sample }} real=%e user=%U sys=%S" \
            env CARGO_TARGET_DIR="$target" cargo +nightly-2026-07-13 "${args[@]}"
          du -sh "$target"

  measure:
    needs: seed
    name: "measure cache sample ${{ matrix.sample }} ${{ matrix.order }}"
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
        order: [dependencies-first, workspace-first]
    env:
      CARGO_BUILD_JOBS: 16
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      RUSTUP_MAX_RETRIES: 10
      UV_HTTP_RETRIES: 5
      UV_INTERNAL__TEST_COW_FS: /btrfs
      UV_INTERNAL__TEST_NOCOW_FS: /tmpfs
      UV_INTERNAL__TEST_ALT_FS: /tmpfs
      UV_INTERNAL__TEST_LOWLINKS_FS: /minix
      INSTA_UPDATE: new
      INSTA_PENDING_DIR: ${{ github.workspace }}/pending-snapshots
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install mold"
        run: ./scripts/install-mold.sh

      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install nightly-2026-07-13 --profile minimal
          cargo +nightly-2026-07-13 --version
          rustc +nightly-2026-07-13 --version --verbose

      - name: "Restore dependencies first"
        if: matrix.order == 'dependencies-first'
        id: dependencies-first
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-07-13
        with:
          prefix-key: v0-uv-workspace-cache-io-20260715a
          shared-key: dependencies-${{ matrix.sample }}
          workspaces: ". -> target-dependencies"
          cache-workspace-crates: "false"
          save-if: false

      - name: "Restore workspace first"
        if: matrix.order == 'workspace-first'
        id: workspace-first
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-07-13
        with:
          prefix-key: v0-uv-workspace-cache-io-20260715a
          shared-key: workspace-${{ matrix.sample }}
          workspaces: ". -> target-workspace"
          cache-workspace-crates: "true"
          save-if: false

      - name: "Restore workspace second"
        if: matrix.order == 'dependencies-first'
        id: workspace-second
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-07-13
        with:
          prefix-key: v0-uv-workspace-cache-io-20260715a
          shared-key: workspace-${{ matrix.sample }}
          workspaces: ". -> target-workspace"
          cache-workspace-crates: "true"
          save-if: false

      - name: "Restore dependencies second"
        if: matrix.order == 'workspace-first'
        id: dependencies-second
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        env:
          RUSTUP_TOOLCHAIN: nightly-2026-07-13
        with:
          prefix-key: v0-uv-workspace-cache-io-20260715a
          shared-key: dependencies-${{ matrix.sample }}
          workspaces: ". -> target-dependencies"
          cache-workspace-crates: "false"
          save-if: false

      - name: "Confirm cache hits"
        shell: bash
        env:
          DEPENDENCIES_CACHE_HIT: ${{ steps.dependencies-first.outputs.cache-hit || steps.dependencies-second.outputs.cache-hit }}
          WORKSPACE_CACHE_HIT: ${{ steps.workspace-first.outputs.cache-hit || steps.workspace-second.outputs.cache-hit }}
        run: |
          set -euo pipefail
          printf 'CACHE sample=%s variant=dependencies hit=%s\n' '${{ matrix.sample }}' "$DEPENDENCIES_CACHE_HIT"
          printf 'CACHE sample=%s variant=workspace hit=%s\n' '${{ matrix.sample }}' "$WORKSPACE_CACHE_HIT"
          test "$DEPENDENCIES_CACHE_HIT" = true
          test "$WORKSPACE_CACHE_HIT" = true
          du -sh target-dependencies target-workspace
