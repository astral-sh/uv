name: "reproduce-bug"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Benchmark label"
        required: true
        type: string
      runner:
        description: "Unused; retained for the existing dispatch interface"
        default: ubuntu-latest
        required: true
        type: choice
        options:
          - ubuntu-latest
          - macos-latest

permissions: {}

jobs:
  benchmark:
    name: "cargo test paired sample ${{ matrix.sample }}"
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]
    env:
      CARGO_BUILD_JOBS: 16
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      CARGO_TERM_COLOR: always
      RUSTUP_MAX_RETRIES: 10
      UV_HTTP_RETRIES: 5
      RUST_BACKTRACE: 1
      UV_INTERNAL__TEST_COW_FS: /btrfs
      UV_INTERNAL__TEST_NOCOW_FS: /tmpfs
      UV_INTERNAL__TEST_ALT_FS: /tmpfs
      UV_INTERNAL__TEST_LOWLINKS_FS: /minix
      INSTA_UPDATE: new
      INSTA_PENDING_DIR: ${{ github.workspace }}/pending-snapshots
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install mold"
        run: ./scripts/install-mold.sh

      - name: "Install Rust toolchains"
        run: |
          rustup toolchain install 1.97.0 nightly-2026-07-13 --profile minimal
          cargo +1.97.0 --version
          rustc +1.97.0 --version --verbose
          cargo +nightly-2026-07-13 --version
          rustc +nightly-2026-07-13 --version --verbose

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: "Install required Python versions"
        run: uv python install

      - name: "Install secret service"
        run: |
          echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/80-retries > /dev/null
          sudo apt install -y gnome-keyring

      - name: "Start gnome-keyring"
        run: gnome-keyring-daemon --components=secrets --daemonize --unlock <<< 'foobar'

      - name: "Create btrfs filesystem"
        run: |
          sudo apt install -y btrfs-progs
          truncate -s 1G /tmp/btrfs.img
          mkfs.btrfs /tmp/btrfs.img
          sudo mkdir /btrfs
          sudo mount -o loop /tmp/btrfs.img /btrfs
          sudo chown "$(id -u):$(id -g)" /btrfs

      - name: "Create tmpfs filesystem"
        run: |
          sudo mkdir /tmpfs
          sudo mount -t tmpfs -o size=256m tmpfs /tmpfs
          sudo chown "$(id -u):$(id -g)" /tmpfs

      - name: "Create minix filesystem"
        run: |
          truncate -s 16M /tmp/minix.img
          mkfs.minix /tmp/minix.img
          sudo mkdir /minix
          sudo mount -o loop /tmp/minix.img /minix
          sudo chown "$(id -u):$(id -g)" /minix

      - name: "Install cargo nextest"
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: "Warm registry cache"
        run: cargo +1.97.0 fetch --locked

      - name: "Warm test artifacts"
        shell: bash
        run: |
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            /usr/bin/time -f "TIMING warmup variant=$variant sample=${{ matrix.sample }} real=%e user=%U sys=%S" \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
          }
          if (( ${{ matrix.sample }} % 2 )); then
            run stable 1.97.0
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          else
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
            run stable 1.97.0
          fi

      - name: "Measure warm compile"
        shell: bash
        run: |
          touch crates/uv/src/lib.rs
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --no-run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
            )
            args+=("$@")
            /usr/bin/time -f "TIMING compile variant=$variant sample=${{ matrix.sample }} real=%e user=%U sys=%S" \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
          }
          if (( ${{ matrix.sample }} % 2 )); then
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
            run stable 1.97.0
          else
            run stable 1.97.0
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          fi

      - name: "Measure overall test job"
        shell: bash
        run: |
          touch crates/uv/src/lib.rs
          run() {
            local variant="$1"
            local toolchain="$2"
            local target="$RUNNER_TEMP/uv-$variant"
            shift 2
            local -a args=(
              nextest run --cargo-quiet --cargo-profile fast-build
              --features test-python-patch,test-universal,native-auth,secret-service
              --workspace --locked --profile ci-linux
              --status-level fail --final-status-level fail
              --failure-output immediate --success-output never
            )
            args+=("$@")
            /usr/bin/time -f "TIMING overall variant=$variant sample=${{ matrix.sample }} real=%e user=%U sys=%S" \
              env CARGO_TARGET_DIR="$target" cargo +"$toolchain" "${args[@]}"
          }
          if (( ${{ matrix.sample }} % 2 )); then
            run stable 1.97.0
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
          else
            run abort nightly-2026-07-13 --config 'profile.fast-build.panic="abort"' -Z panic-abort-tests
            run stable 1.97.0
          fi
