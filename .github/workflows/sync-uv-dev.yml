name: Sync uv-dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sync-uv-dev-main
  cancel-in-progress: false

jobs:
  sync:
    name: Sync uv-dev
    if: github.repository == 'astral-sh/uv'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for the credential broker
    steps:
      - name: Get uv-dev token
        id: token
        uses: open-security-tools/ost-simple-sts@7261a2f062dc43a7b496c38da6ec48380f7e1a1a
        with:
          exchange-url: https://jgfdc240oh.execute-api.us-east-2.amazonaws.com/exchange
          audience: https://jgfdc240oh.execute-api.us-east-2.amazonaws.com

      - name: Sync main
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh api \
            --method POST \
            repos/astral-sh/uv-dev/merge-upstream \
            --field branch=main
