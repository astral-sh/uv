name: Rebase retargeted pull request

on:
  # `pull_request` does not run for conflicted pull requests. This only dispatches the trusted
  # workflow on `main`; it never checks out or executes pull request code.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [edited]

permissions: {}

jobs:
  dispatch:
    name: "Rebase pull request #${{ github.event.pull_request.number }}"
    if: >-
      github.repository == 'astral-sh/uv-dev' &&
      github.event.changes.base != null &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Dispatch pull request rebase
        env:
          GH_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run pull-request-conflicts.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field pull_request="$PULL_REQUEST_NUMBER"
