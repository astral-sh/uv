on:
  workflow_call:
    inputs:
      schema-changed:
        required: true
        type: string
      save-rust-cache:
        required: false
        type: string
        default: "true"

permissions: {}

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  cargo-dev-generate-all:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    name: "cargo dev generate-all"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: "Install Rustfmt"
        run: |
          rustup component add rustfmt
          mkdir -p "$RUNNER_TEMP/rustfmt-bin"
          ln -s "$(rustup which rustfmt)" "$RUNNER_TEMP/rustfmt-bin/rustfmt"
          echo "$RUNNER_TEMP/rustfmt-bin" >> "$GITHUB_PATH"
      - name: "Setup srs"
        id: srs
        uses: ./.github/actions/setup-srs
        with:
          artifact-cache-scope: github-linux-dev
      - name: "Diagnose srs artifact cache"
        env:
          CARGO_LOG: cargo::core::compiler=debug
          CARGO_TARGET_DIR: ${{ runner.temp }}/srs-artifact-cache-probe
        run: |
          echo "Cargo: $(command -v cargo)"
          test "$(command -v cargo)" = "$CARGO"
          echo "Loader environment:"
          env | grep -E '^(GLIBC_TUNABLES|LD_|DYLD_)=' || true
          echo "Restored srs cache:"
          du -sh ~/.cargo/srs-artifact-cache-v2 || true
          find ~/.cargo/srs-artifact-cache-v2 -type f | wc -l
          cargo build --package uv-static --lib \
            > "$RUNNER_TEMP/srs-artifact-cache-probe.log" 2>&1
          grep -E 'artifact cache|Compiling|Finished' \
            "$RUNNER_TEMP/srs-artifact-cache-probe.log"
          grep -q 'stored artifact cache entry' \
            "$RUNNER_TEMP/srs-artifact-cache-probe.log"
          test -d ~/.cargo/srs-artifact-cache-v2
          test "$(find ~/.cargo/srs-artifact-cache-v2 -type f | wc -l)" -gt 0
      - name: "Generate all"
        run: cargo dev generate-all --mode dry-run
      - name: "Check sysconfig mappings"
        run: cargo dev generate-sysconfig-metadata --mode check
      - name: "Check Packse scenario tests"
        run: cargo dev generate-scenario-tests --mode check
      - name: "Check JSON schema"
        if: ${{ inputs.schema-changed == 'true' }}
        run: cargo dev generate-json-schema --mode check
      - name: "Save srs build cache"
        if: ${{ inputs.save-rust-cache == 'true' }}
        uses: ./.github/actions/save-srs-cache
        with:
          artifact-cache-hit: ${{ steps.srs.outputs.artifact-cache-hit }}
          artifact-cache-primary-key: ${{ steps.srs.outputs.artifact-cache-primary-key }}
          save-artifact-cache: "true"
