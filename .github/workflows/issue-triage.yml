# Analyze newly opened issues without modifying them.
name: "issue-triage"

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  triage:
    if: github.repository == 'astral-sh/uv'
    runs-on: ubuntu-latest
    environment: automations
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
    outputs:
      result: ${{ steps.triage.outputs.final-message }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Collect issue context"
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json number,title,body,author \
            > .issue-triage-event.json
          gh label list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json name,description \
            > .issue-triage-labels.json
          jq -r '
            ["about", "after", "before", "being", "could", "does", "error", "failed", "fails",
             "failure", "from", "have", "into", "issue", "should", "that", "then", "this",
             "using", "what", "when", "where", "which", "while", "with", "without", "would"]
              as $stopwords
            | .title
            | ascii_downcase
            | scan("[[:alnum:]_.-]{4,}")
            | select(. as $word | ($stopwords | index($word) | not))
          ' .issue-triage-event.json \
            | awk '!seen[$0]++ && count < 4 { print; count++ }' \
            | while IFS= read -r query; do
                for state in closed open; do
                  gh search issues \
                    --repo "$GITHUB_REPOSITORY" \
                    --match title,body \
                    --state "$state" \
                    --limit 10 \
                    --json number,title,body,state,url,labels \
                    -- "$query" \
                    | jq -c '.[] | .body = ((.body // "")[:2000])'
                done
              done \
            | jq -s \
                --argjson issue_number "$ISSUE_NUMBER" \
                'reduce .[] as $issue ([];
                  if $issue.number == $issue_number or any(.[]; .number == $issue.number)
                  then .
                  else . + [$issue]
                  end
                )' \
            > .issue-triage-related-issues.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: "Triage issue"
        id: triage
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          safety-strategy: drop-sudo
          allow-users: "*"
          prompt-file: "agents/prompts/triage-issue.md"

  report:
    needs: triage
    if: needs.triage.outputs.result != ''
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: "Write triage summary"
        run: printf '%s\n' "$TRIAGE_RESULT" >> "$GITHUB_STEP_SUMMARY"
        env:
          TRIAGE_RESULT: ${{ needs.triage.outputs.result }}
