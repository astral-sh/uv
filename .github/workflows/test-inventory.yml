# test-inventory.yml: take an inventory of our unit and integration tests
# using `cargo nextest list --workspace --all-features --tests -T json`
# and upload it as an artifact for diffing in PRs.
# 
# This workflow is *not* responsible for leaving comments; it only collects
# the inventory. astral-bot is subsequently responsible for retrieving
# the inventory and leaving comments on PRs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  nextest-inventory:
    timeout-minutes: 10
    runs-on: depot-ubuntu-24.04-16
    name: "nextest inventory"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install mold"
        run: ./scripts/install-mold.sh

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      
      - name: "Install cargo nextest"
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: cargo-nextest

      - name: "Generate nextest inventory"
        run: cargo nextest list --workspace --all-features --tests -T json > nextest-inventory.json

      - name: "Upload nextest inventory"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-inventory
          path: nextest-inventory.json
          retention-days: 14
