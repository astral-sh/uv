name: Mimalloc v3 residual RSS benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Benchmark metric to collect
        required: true
        default: rss-smoke
        type: choice
        options:
          - rss-smoke
          - rss

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    name: build benchmark binaries
    runs-on: namespace-profile-windows-2022-x86-64-4
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Dev Drive
        run: ${{ github.workspace }}/.github/workflows/setup-dev-drive.ps1

      - name: Copy Git repository to Dev Drive
        run: |
          Copy-Item -Path "${{ github.workspace }}" -Destination "$Env:UV_WORKSPACE" -Recurse

      - name: Install Rust toolchain
        run: rustup show

      - name: Build benchmark binaries
        shell: pwsh
        working-directory: ${{ env.UV_WORKSPACE }}
        run: ./.github/scripts/mimalloc-build-binaries.ps1

      - name: Upload benchmark binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mimalloc-binaries
          path: ${{ runner.temp }}/mimalloc-build/artifact
          compression-level: 0
          retention-days: 7

  rss:
    name: residual RSS replica ${{ matrix.replica }}
    if: startsWith(inputs.mode, 'rss')
    needs: build
    runs-on: namespace-profile-windows-2022-x86-64-4
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        replica: ${{ fromJSON(inputs.mode == 'rss' && '[1,2,3,4,5]' || '[1]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Dev Drive
        run: ${{ github.workspace }}/.github/workflows/setup-dev-drive.ps1

      - name: Copy Git repository to Dev Drive
        run: |
          Copy-Item -Path "${{ github.workspace }}" -Destination "$Env:UV_WORKSPACE" -Recurse

      - name: Download benchmark binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mimalloc-binaries
          path: ${{ runner.temp }}/mimalloc-binaries

      - name: Run RSS benchmark
        shell: pwsh
        working-directory: ${{ env.UV_WORKSPACE }}
        env:
          BENCH_REPLICA: ${{ matrix.replica }}
          BENCH_SMOKE: ${{ inputs.mode == 'rss-smoke' && '1' || '0' }}
        run: ./.github/scripts/mimalloc-high-confidence-rss.ps1

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mimalloc-rss-replica-${{ matrix.replica }}
          path: ${{ runner.temp }}/mimalloc-rss/results
          if-no-files-found: warn
          retention-days: 7
