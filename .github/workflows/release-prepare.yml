# Bump the uv version and create a pull request.
name: "Prepare release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "The version bump type (auto-detected from PR labels if not specified)"
        required: false
        type: string
      version:
        description: "The exact version to set (overrides bump)"
        required: false
        type: string

permissions: {}

jobs:
  authorize:
    if: github.repository == 'astral-sh/uv'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Verify maintainer access"
        run: |
          role="$(gh api \
            "repos/${GITHUB_REPOSITORY}/collaborators/${GITHUB_ACTOR}/permission" \
            --jq '.role_name')"
          if [[ "$role" != "admin" && "$role" != "maintain" ]]; then
            echo "${GITHUB_ACTOR} must have the maintain repository role to prepare a release." >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: github.repository == 'astral-sh/uv'
    needs: authorize
    runs-on: ubuntu-latest
    environment: automations
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "latest"
          enable-cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: false

      - name: "Configure Git"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Bump version"
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            ./scripts/release.sh --version "$INPUT_VERSION"
          elif [ -n "$INPUT_BUMP" ]; then
            ./scripts/release.sh --bump "$INPUT_BUMP"
          else
            ./scripts/release.sh
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}

      - name: "Rewrite changelog"
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          safety-strategy: drop-sudo
          prompt: |
            Rewrite the changelog entry for the release prepared in the previous step.

            Edit only `CHANGELOG.md`, and only the newest release section added by
            the release commit at `HEAD`. Compare it with the release sections that
            precede it and match their style. Inspect the included changes in the
            local Git history when the generated title is not enough to write an
            accurate, user-facing entry.

            Preserve the release version, date, every included pull request, and
            every pull request link. Improve the wording, categorization, and order
            of entries. Use concise imperative descriptions, the established
            section names, and Markdown formatting consistent with prior releases.
            Put the most significant user-facing changes first within each section
            and remove any empty sections. Do not edit historical release sections
            or modify any other file.

      - name: "Commit changelog rewrite"
        run: |
          git diff --check -- CHANGELOG.md
          if git diff --quiet -- CHANGELOG.md && git diff --cached --quiet -- CHANGELOG.md; then
            echo "Codex left the generated changelog unchanged."
          else
            git -c core.hooksPath=/dev/null commit --only --message "Rewrite changelog" -- CHANGELOG.md
          fi

      - name: "Create Pull Request"
        run: |
          branch="$(git branch --show-current)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --fill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
