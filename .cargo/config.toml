[alias]
dev = "run --package uv-dev --features dev"

[env]
# Limit the number of arenas used by uv and retain the jemalloc 5.3.0 large size class behavior.
# The jemalloc 5.3.1 default increased peak RSS by ~3% in uv benchmarks.
JEMALLOC_SYS_WITH_MALLOC_CONF = "narenas:16,disable_large_size_classes:false"

# statically link the C runtime so the executable does not depend on
# that shared/dynamic library.
#
# See: https://github.com/astral-sh/ruff/issues/11503
[target.'cfg(all(target_env = "msvc", target_os = "windows"))']
rustflags = ["-C", "target-feature=+crt-static"]
