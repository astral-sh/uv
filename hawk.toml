# Keep intentional uniform field visibility audited instead of excluding whole files.

preserve-uniform-field-visibility = true

[[production]]
package = "uv"
bin = "uv"
reason = "shipped package manager binary"

[[production]]
package = "uv-dev"
bin = "uv-dev"
reason = "developer binary shipped from this workspace"

