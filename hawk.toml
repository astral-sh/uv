# Keep intentional uniform field visibility audited instead of excluding whole files.

preserve-uniform-field-visibility = true

[[production]]
package = "uv"
bin = "uv"
reason = "shipped package manager binary"

[[production]]
package = "uv-dev"
bin = "uv-dev"
reason = "developer binary shipped from this workspace"

# Keep APIs that are consumed by another platform or by non-Rust components.

[[override]]
lint = "hawk::dead_public"
crate = "uv_fs"
item = "with_retry_sync"
kind = "function"
level = "expect"
target = "cfg(not(windows))"
reason = "used by the Windows installer path"

