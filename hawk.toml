# Keep intentional uniform field visibility audited instead of excluding whole files.

preserve-uniform-field-visibility = true

[[production]]
package = "uv"
bin = "uv"
reason = "shipped package manager binary"

[[production]]
package = "uv-dev"
bin = "uv-dev"
reason = "developer binary shipped from this workspace"

# Keep this list in sync with workspace packages that define doctests.

[[doctest]]
package = "uv-pep440"

[[doctest]]
package = "uv-pep508"

[[doctest]]
package = "uv-redacted"

# Keep public APIs that are consumed by downstream Rust integrations.

[[override]]
lint = "hawk::unnecessary_public"
crate = "uv_client"
item = "base_client::BaseClientBuilder::<'a>::custom_client"
kind = "inherent_method"
level = "expect"
reason = "used by Pixi to provide its own HTTP client"

[[override]]
lint = "hawk::dead_public"
crate = "uv_client"
item = "base_client::BaseClientBuilder::<'a>::extra_middleware"
kind = "inherent_method"
level = "expect"
reason = "used by Pixi to attach downstream HTTP middleware"

[[override]]
lint = "hawk::dead_public"
crate = "uv_client"
item = "base_client::BaseClientBuilder::<'a>::proxy"
kind = "inherent_method"
level = "expect"
reason = "retained for downstream uv-client consumers"

[[override]]
lint = "hawk::dead_public"
crate = "uv_client"
item = "registry_client::RegistryClientBuilder::<'a>::extra_middleware"
