name = "lowest-direct-fork-min-python"
description = "Prefer the lowest direct dependency only where a Python marker makes it direct."

[environment]
python = "3.11"

[root]
requires_python = ">=0"
requires = [
  "forkroot==3.0.0",
  "forkdep>=3; python_version >= '3.12'",
]

[expected]
satisfiable = true

[expected.packages]
forkroot = "3.0.0"
forkdep = "3.1"
forkleaf = "1.1.0"

[packages.forkroot.versions."3.0.0"]
requires_python = ">=0"
requires = ["forkdep>=2.8", "forkleaf>=1.1"]

[packages.forkdep.versions."2.8"]
requires_python = ">=0"

[packages.forkdep.versions."3.0"]
requires_python = ">=0"

[packages.forkdep.versions."3.1"]
requires_python = ">=0"

[packages.forkleaf.versions."1.1.0"]
requires_python = ">=3.11"

[testgen]
kind = "compile"

[resolver_options]
resolution = "lowest-direct"
universal = true
