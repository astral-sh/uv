name = "package-prereleases-specifier-boundary"
description = "An explicit pre-release specifier includes stable and pre-release candidates at the boundary of its range."

[root]
requires = ["a<0.2.0a2"]

[expected]
satisfiable = true
explanation = "The stable candidate is preferred over pre-releases at the boundary of the range."

[expected.packages]
a = "0.1.0"

[packages.a.versions."0.1.0"]

[packages.a.versions."0.2.0"]

[packages.a.versions."0.2.0a1"]

[packages.a.versions."0.2.0a2"]

[packages.a.versions."0.2.0a3"]

[packages.a.versions."0.3.0"]
