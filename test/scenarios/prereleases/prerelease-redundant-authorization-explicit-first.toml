name = "prerelease-redundant-authorization-explicit-first"
description = "A broader pre-release requirement authorizes matching pre-releases when it appears before a narrower plain requirement."

[root]
requires = ["c>=0.5a1", "c>=1.0"]

[expected]
satisfiable = true
explanation = "The broader requirement on `c>=0.5a1` authorizes matching pre-releases after the active range is narrowed by `c>=1.0`."

[expected.packages]
c = "2.0.0a1"

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
