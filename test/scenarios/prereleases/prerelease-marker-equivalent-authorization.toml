name = "prerelease-marker-equivalent-authorization"
description = "Requirements on the same marker proxy share pre-release admission within their fork."

[resolver_options]
universal = true

[root]
requires_python = ">=3.12"
requires = [
  "c>=1.0 ; sys_platform == 'linux'",
  "c>=0.5a1 ; sys_platform == 'linux'",
]

[expected]
satisfiable = true
explanation = "The equivalent Linux requirements share pre-release admission and select `c==2.0.0a1` in the fork where they apply."

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
