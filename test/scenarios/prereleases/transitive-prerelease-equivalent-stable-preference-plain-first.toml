name = "transitive-prerelease-equivalent-stable-preference-plain-first"
description = "Requirements from one parent retain the stable preference when the plain requirement appears first."

[root]
requires = ["a"]

[expected]
satisfiable = true
explanation = "Requirements from one selected parent retain the stable preference regardless of requirement order."

[expected.packages]
a = "1.0.0"
c = "1.0.0"

[packages.a.versions."1.0.0"]
requires = ["c>=1.0", "c>=1.0,>0.5a1"]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
