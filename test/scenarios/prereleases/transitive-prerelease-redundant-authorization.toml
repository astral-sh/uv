name = "transitive-prerelease-redundant-authorization"
description = "A transitive pre-release requirement contributes admission even when it does not narrow the active version range."

[root]
requires = ["a", "c>=1.0"]

[expected]
satisfiable = true
explanation = "The active transitive requirement on `c>=0.5a1` admits matching pre-releases even though the root requirement on `c>=1.0` is narrower."

[expected.packages]
a = "1.0.0"
c = "2.0.0a1"

[packages.a.versions."1.0.0"]
requires = ["c>=0.5a1"]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
