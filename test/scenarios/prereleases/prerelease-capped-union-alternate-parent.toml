name = "prerelease-capped-union-alternate-parent"
description = "A capped pre-release branch cannot authorize an unrelated pre-release in a higher active range."

[root]
requires = ["d", "g!=2.5"]

[expected]
satisfiable = true
explanation = "The active `c>=3.5,<4` requirement selects the final `3.5`; the rejected `c==2.0b1` branch does not authorize `3.6b1`."

[expected.packages]
a = "3.6b1"
c = "3.5"
d = "3.0"
g = "4.0"

[packages.a.versions."2.5"]
requires = ["c==2.5"]

[packages.a.versions."3.6b1"]

[packages.c.versions."2.5"]

[packages.c.versions."3.5"]

[packages.c.versions."3.6b1"]

[packages.d.versions."3.0"]
requires = ["a>=1.0"]

[packages.g.versions."2.0b1"]
requires = ["c==2.0b1"]

[packages.g.versions."4.0"]
requires = ["c>=3.5,<4"]
