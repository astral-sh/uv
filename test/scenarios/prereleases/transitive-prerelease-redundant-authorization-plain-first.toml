name = "transitive-prerelease-redundant-authorization-plain-first"
description = "A stable selection can be retained when a compatible plain root requirement is prioritized before a redundant transitive pre-release requirement."

[root]
requires = ["c>=1.0", "a"]

[expected]
satisfiable = true
explanation = "Resolving the root `c>=1.0` requirement first selects `c==1.0.0`. The later `c>=0.5a1` requirement is compatible with that decision, so it does not require a different solution."

[expected.packages]
a = "1.0.0"
c = "1.0.0"

[packages.a.versions."1.0.0"]
requires = ["c>=0.5a1"]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
