name = "transitive-prerelease-authorizes-newer-prerelease"
description = "An active transitive dependency with a pre-release specifier authorizes newer matching pre-releases."

[root]
requires = ["a"]

[expected]
satisfiable = true
explanation = "The selected version of `a` explicitly opts `c` into pre-releases."

[expected.packages]
a = "1.0.0"
c = "2.0.0a1"

[packages.a.versions."1.0.0"]
requires = ["c>=1.0.0a1"]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
