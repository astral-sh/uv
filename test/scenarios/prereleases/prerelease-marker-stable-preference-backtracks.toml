name = "prerelease-marker-stable-preference-backtracks"
description = "A marker-scoped pre-release requirement from a rejected parent does not affect a plain alternate parent."

[resolver_options]
universal = true

[root]
requires_python = ">=3.12"
requires = ["a", "d==1.0.0"]

[expected]
satisfiable = true
explanation = "The rejected parent version has a Linux pre-release requirement, but the selected alternate parent retains only its plain requirement and selects stable `c==1.0.0`."

[expected.packages]
a = "1.0.0"
c = "1.0.0"
d = "1.0.0"

[packages.a.versions."1.0.0"]
requires = ["c>=1.0 ; sys_platform == 'linux'"]

[packages.a.versions."2.0.0"]
requires = [
  "c>=1.0 ; sys_platform == 'linux'",
  "c>=0.5a1 ; sys_platform == 'linux'",
  "d==2.0.0",
]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]

[packages.d.versions."1.0.0"]

[packages.d.versions."2.0.0"]
