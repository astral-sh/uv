name = "prerelease-multiple-redundant-stable-preference-explicit-first"
description = "An explicit requirement retains the stable preference alongside multiple plain requirements in the same dependency batch."

[root]
requires = ["c>=0.5a1", "c<3.0", "c>=1.0"]

[expected]
satisfiable = true
explanation = "The explicit requirement does not override the stable preference, so `c==1.5.0` is selected independently of requirement order."

[expected.packages]
c = "1.5.0"

[packages.c.versions."1.5.0"]

[packages.c.versions."2.0.0a1"]

[packages.c.versions."3.0.0"]
