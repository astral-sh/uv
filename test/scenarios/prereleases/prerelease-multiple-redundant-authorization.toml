name = "prerelease-multiple-redundant-authorization"
description = "A pre-release requirement shares admission with multiple plain requirements in the same root dependency batch."

[root]
requires = ["c>=1.0", "c<3.0", "c>=0.5a1"]

[expected]
satisfiable = true
explanation = "The final admission region is shared by every same-package requirement, so the broader pre-release requirement authorizes `c==2.0.0a1` even when it appears last."

[expected.packages]
c = "2.0.0a1"

[packages.c.versions."1.5.0"]

[packages.c.versions."2.0.0a1"]

[packages.c.versions."3.0.0"]
