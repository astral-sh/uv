name = "prerelease-multiple-redundant-authorization"
description = "A pre-release requirement authorizes multiple plain requirements in the same root dependency batch."

[root]
requires = ["c>=1.0", "c<3.0", "c>=0.5a1"]

[expected]
satisfiable = true
explanation = "The broader pre-release requirement authorizes the same-package dependency batch, so `c==2.0.0a1` is selected even when that requirement appears last."

[expected.packages]
c = "2.0.0a1"

[packages.c.versions."1.5.0"]

[packages.c.versions."2.0.0a1"]

[packages.c.versions."3.0.0"]
