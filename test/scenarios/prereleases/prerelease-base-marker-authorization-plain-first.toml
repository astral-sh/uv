name = "prerelease-base-marker-authorization-plain-first"
description = "Base and marker requirements share pre-release admission within the marker fork when the plain requirement appears first."

[resolver_options]
universal = true

[root]
requires_python = ">=3.12"
requires = [
  "c>=1.0",
  "c>=0.5a1 ; sys_platform == 'linux'",
]

[expected]
satisfiable = true
explanation = "Linux selects the explicitly authorized pre-release of `c`, while other platforms retain the stable release, regardless of declaration order."

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
