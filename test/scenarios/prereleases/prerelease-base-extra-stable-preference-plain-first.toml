name = "prerelease-base-extra-stable-preference-plain-first"
description = "Base and extra requirements retain the stable preference when the plain base requirement appears first."

[root]
requires = ["c>=1.0", "c[extra]>=0.5a1"]

[expected]
satisfiable = true
explanation = "Requirements on a distribution and one of its extras select the same stable version regardless of declaration order."

[expected.packages]
c = "1.0.0"

[packages.c.versions."1.0.0".extras]
extra = []

[packages.c.versions."2.0.0a1".extras]
extra = []
