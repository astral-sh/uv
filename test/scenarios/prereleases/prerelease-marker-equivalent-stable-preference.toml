name = "prerelease-marker-equivalent-stable-preference"
description = "Requirements with the same marker retain the stable preference within their fork."

[resolver_options]
universal = true

[root]
requires_python = ">=3.12"
requires = [
  "c>=1.0 ; sys_platform == 'linux'",
  "c>=0.5a1 ; sys_platform == 'linux'",
]

[expected]
satisfiable = true
explanation = "The equivalent Linux requirements prefer `c==1.0.0` in the fork where they apply."

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
