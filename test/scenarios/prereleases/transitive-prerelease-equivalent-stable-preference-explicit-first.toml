name = "transitive-prerelease-equivalent-stable-preference-explicit-first"
description = "Requirements from one parent retain the stable preference when the explicit requirement appears first."

[root]
requires = ["a"]

[expected]
satisfiable = true
explanation = "Requirements from one selected parent retain the stable preference even when one names a pre-release."

[expected.packages]
a = "1.0.0"
c = "1.0.0"

[packages.a.versions."1.0.0"]
requires = ["c>=1.0,>0.5a1", "c>=1.0"]

[packages.c.versions."1.0.0"]

[packages.c.versions."2.0.0a1"]
