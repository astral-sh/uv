name = "equivalent-dependency-ranges"
description = "Two versions of a package use differently spelled but selection-equivalent dependency ranges."

[root]
requires = ["a", "c<=1.0a1"]

[expected]
satisfiable = false
explanation = "Both versions of `a` require the same logical and pre-release admission range of `c`, which conflicts with the root requirement."

[packages.a.versions."1.0.0"]
requires = ["c>1.0a1"]

[packages.a.versions."2.0.0"]
requires = ["c>=1.0a2.dev0"]

[packages.c.versions."1.0a1"]

[packages.c.versions."1.0.0"]
