name = "coalesce-prefetched-dependencies"
description = """A parent pins a different core release at each version. The newer core releases have identical, incompatible dependencies, so backtracking the parent repeatedly visits adjacent core versions whose prefetched metadata can share one dependency incompatibility."""

[expected]
satisfiable = true

[expected.packages]
leaf = "1.0.0"
parent = "2.0.0"
core = "2.0.0"

[resolver_options]
test = "compile"
universal = false

[root]
requires = ["leaf==1.0.0", "parent"]

[packages.leaf.versions]
"1.0.0" = {}
"2.0.0" = {}

[packages.parent.versions]
"2.0.0" = { requires = ["core==2.0.0"] }
"3.0.0" = { requires = ["core==3.0.0"] }
